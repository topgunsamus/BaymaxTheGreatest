<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Baymax The Great!</title>

<style>
  body {
    margin: 0;
    font-family: "Trebuchet MS", system-ui, sans-serif;
    background: radial-gradient(circle at top, #5a2a82, #3b1a5c, #2a1242);
    height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f3d9ff;
    overflow: hidden;
  }

.wrapper {
  width: 100%;
  max-width: 420px;   /* This forces desktop to match mobile */
  margin: 0 auto;
  padding: 0 1rem;
  text-align: center;
  position: relative;
  z-index: 10;
}

  h1 {
    font-size: 1.8rem;
    margin-bottom: 1rem;
    text-shadow: 0 0 12px rgba(255,255,255,0.7);
  }

  .cat-container {
   width: 220px;
  height: 220px;
  margin: 0 auto 1.2rem;
  position: relative;

  }

  .cat {
    width: 100%;
    height: 100%;
    background-image: url('baymax.png');
    background-size: cover;
    background-position: center;
    border-radius: 12px;
    filter: drop-shadow(0 0 18px rgba(200,150,255,0.9));
    box-shadow: 0 0 25px rgba(180,120,255,0.4);
  }

  /* BONUS-DAY GLOW + SPARKLES */
  .cat.bonus-glow {
    position: relative;
    box-shadow:
      0 0 25px rgba(255, 210, 255, 0.9),
      0 0 45px rgba(255, 160, 255, 0.7),
      0 0 70px rgba(255, 140, 255, 0.5);
    animation: bonusPulse 2s ease-in-out infinite;
  }

  @keyframes bonusPulse {
    0% {
      transform: scale(1);
      filter: drop-shadow(0 0 18px rgba(200,150,255,0.9));
    }
    50% {
      transform: scale(1.02);
      filter: drop-shadow(0 0 26px rgba(255,200,255,1));
    }
    100% {
      transform: scale(1);
      filter: drop-shadow(0 0 18px rgba(200,150,255,0.9));
    }
  }

  .bonus-sparkle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: radial-gradient(circle, #ffe6ff, #ffb3ff);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    filter: drop-shadow(0 0 6px #ffd6ff);
    animation: bonusSparkle 2.4s ease-out forwards;
  }

  @keyframes bonusSparkle {
    0% {
      transform: translate3d(0, 0, 0) scale(0.6);
      opacity: 0;
    }
    20% {
      opacity: 1;
    }
    100% {
      transform: translate3d(var(--sx), var(--sy), 0) scale(0);
      opacity: 0;
    }
  }

  .paw-btn {
    width: 22vw;
    height: 22vw;
    max-width: 110px;
    max-height: 110px;
    background-image: url('pawprint.png');
    background-size: cover;
    image-rendering: pixelated;
    cursor: pointer;
    margin: 0 auto 1.2rem;
    transition: transform 0.15s ease;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.9));
  }

  .paw-btn:active { transform: scale(0.9); }

  .fortune {
    min-height: 40px;
    max-width: 90%;
    margin: 0.5rem auto 0;
    padding: 0.8rem 1rem;
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.35);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.22s ease, transform 0.22s ease;
    backdrop-filter: blur(4px);
    text-align: center;
    font-size: 1rem;
    line-height: 1.35;
  }

  .fortune.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* RARITY COLORS */
  .fortune.common { color: #ffffff; }
  .fortune.uncommon { color: #7CFF7C; text-shadow: 0 0 6px rgba(124,255,124,0.6); }
  .fortune.rare { color: #6EC6FF; text-shadow: 0 0 8px rgba(110,198,255,0.8); }
  .fortune.ultra { color: #ffb347; text-shadow: 0 0 12px rgba(255,179,71,1); }

  /* BIG Magical Pixel Dust */
  .particle {
    position: absolute;
    width: 16px;
    height: 16px;
    background: white;
    image-rendering: pixelated;
    border-radius: 3px;
    opacity: 0.95;
    pointer-events: none;
    filter: drop-shadow(0 0 8px white);
    animation: floatBurst 1.4s ease-out forwards;
  }

  @keyframes floatBurst {
    0% { transform: translate(0, 0) scale(1.4); opacity: 1; }
    60% { opacity: 1; }
    100% { transform: translate(var(--x-move), var(--y-move)) scale(0.4); opacity: 0; }
  }

  /* Star Rain */
  .star {
    position: fixed;
    top: -20px;
    width: 10px;
    height: 10px;
    background: #ffeaff;
    border-radius: 50%;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 6px #ffd6ff);
    opacity: 0.9;
    animation: fall linear forwards;
  }

  @keyframes fall {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(110vh) scale(0.4); opacity: 0; }
  }

  /* EXPLODING CONFETTI */
  .confetti {
    position: fixed;
    width: 12px;
    height: 16px;
    background: pink;
    opacity: 0.9;
    pointer-events: none;
    border-radius: 2px;
    filter: drop-shadow(0 0 6px rgba(255,200,255,0.8));
    animation: confettiExplode 2.4s ease-out forwards;
  }

  @keyframes confettiExplode {
    0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--x-move), var(--y-move)) rotate(var(--spin)); opacity: 0; }
  }

  /* Ultra Rare Fireworks */
  .firework {
    position: fixed;
    width: 8px;
    height: 8px;
    background: #ffd6ff;
    border-radius: 50%;
    pointer-events: none;
    animation: fireworkFall 1.2s ease-out forwards;
    filter: drop-shadow(0 0 8px #ffbaff);
  }

  @keyframes fireworkFall {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(100vh) scale(0.2); opacity: 0; }
  }

  /* ULTRA RARE SCREEN FLASH */
  .screen-flash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(255, 180, 50, 0.8);
    pointer-events: none;
    z-index: 9999;
    animation: flashFade 0.6s ease-out forwards;
  }

  @keyframes flashFade {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* DEV FLASH */
  @keyframes devFlash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.5rem; }
    .fortune { font-size: 0.95rem; }
	
	.logo {
  width: 100%;
  max-width: 240px;   /* Same size as mobile */
  height: auto;
  margin: 0 auto 1rem;
  display: block;
}


  }
</style>
</head>
<body>

<div class="wrapper">
  <img src="logo.png" alt="Ask Baymax The Great!" class="logo" />


  <div class="cat-container">
    <div class="cat" id="baymaxCat"></div>
  </div>

  <div class="paw-btn" id="pawBtn"></div>

  <div class="fortune" id="fortuneBox">
    Press the pawprint to know your future..
  </div>
</div>

<script>
  /* ---------------------------------------------------------
     GLOBAL STATE
  --------------------------------------------------------- */
  let fortunes = [];
  let bonusDay = null;

  /* ---------------------------------------------------------
     LOAD FORTUNES (assign IDs for no-duplicate system)
  --------------------------------------------------------- */
  fetch("fortunes.json")
    .then(r => r.json())
    .then(data => {
      fortunes = data.fortunes.map((f, i) => ({
        id: i + 1,
        ...f
      }));
    });

  /* ---------------------------------------------------------
     LOAD BONUS DAY
  --------------------------------------------------------- */
  function loadBonusDay() {
    fetch("bonus.json")
      .then(r => r.json())
      .then(data => {
        bonusDay = data.bonusDay;
        applyBonusVisualsIfNeeded();
      })
      .catch(() => {
        bonusDay = null;
      });
  }
  loadBonusDay();

  /* ---------------------------------------------------------
     DATE HELPERS
  --------------------------------------------------------- */
  function todayString() {
    return new Date().toISOString().split("T")[0];
  }

  function isToday(dateStr) {
    return dateStr === todayString();
  }

  /* ---------------------------------------------------------
     BONUS SYSTEM STORAGE
  --------------------------------------------------------- */
  function resetBonusIfNewDay() {
    const today = todayString();
    const last = localStorage.getItem("bonusLastCheck");

    if (today !== last) {
      localStorage.removeItem("bonusUsed");
      localStorage.setItem("bonusLastCheck", today);
    }
  }
  resetBonusIfNewDay();

  function tryBonusFortune() {
    if (!bonusDay || bonusDay === "none") return false;
    if (!isToday(bonusDay)) return false;
    if (localStorage.getItem("bonusUsed") === "true") return false;

    localStorage.setItem("bonusUsed", "true");
    return true;
  }

  /* ---------------------------------------------------------
     NO-DUPLICATE SYSTEM
  --------------------------------------------------------- */
  function getUsedFortunes() {
    return JSON.parse(localStorage.getItem("usedFortunes") || "[]");
  }

  function saveUsedFortune(id) {
    const used = getUsedFortunes();
    used.push(id);
    localStorage.setItem("usedFortunes", JSON.stringify(used));
  }

  /* ---------------------------------------------------------
     WEIGHTED PICK WITH NO DUPLICATES
  --------------------------------------------------------- */
  function getWeightedFortune() {
    const used = getUsedFortunes();
    const available = fortunes.filter(f => !used.includes(f.id));

    if (available.length === 0) {
      localStorage.removeItem("usedFortunes");
      return {
        text: "You have uncovered every prophecy. The universe quietly reshuffles the deck...",
        rarity: "rare",
        weight: 1
      };
    }

    const total = available.reduce((sum, f) => sum + f.weight, 0);
    let r = Math.random() * total;

    for (const f of available) {
      if (r < f.weight) return f;
      r -= f.weight;
    }

    return available[0];
  }

  /* ---------------------------------------------------------
     BONUS-DAY VISUALS (Glow + Sparkles)
  --------------------------------------------------------- */
  function applyBonusVisualsIfNeeded() {
    if (!bonusDay || !isToday(bonusDay)) return;

    const cat = document.getElementById("baymaxCat");
    cat.classList.add("bonus-glow");

    startBonusSparkles();
  }

  function startBonusSparkles() {
    const container = document.querySelector(".cat-container");

    setInterval(() => {
      const s = document.createElement("div");
      s.classList.add("bonus-sparkle");

      const x = Math.random() * container.clientWidth;
      const y = Math.random() * container.clientHeight;

      s.style.left = x + "px";
      s.style.top = y + "px";

      const angle = Math.random() * Math.PI * 2;
      const dist = 40 + Math.random() * 60;

      s.style.setProperty("--sx", Math.cos(angle) * dist + "px");
      s.style.setProperty("--sy", Math.sin(angle) * dist + "px");

      container.appendChild(s);
      setTimeout(() => s.remove(), 2400);
    }, 900);
  }
    /* ---------------------------------------------------------
     STAR RAIN (your original)
  --------------------------------------------------------- */
  function spawnStar() {
    const star = document.createElement("div");
    star.classList.add("star");
    star.style.left = Math.random() * 100 + "vw";
    star.style.animationDuration = 3 + Math.random() * 4 + "s";
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 7000);
  }
  setInterval(spawnStar, 200);

  /* ---------------------------------------------------------
     ORIGINAL DAILY LIMIT
  --------------------------------------------------------- */
  function canGetFortuneToday() {
    const last = localStorage.getItem("lastFortuneDate");
    const today = new Date().toDateString();
    if (last === today) return false;
    localStorage.setItem("lastFortuneDate", today);
    return true;
  }

  /* ---------------------------------------------------------
     TRIPLE TAP DEV RESET (unchanged)
  --------------------------------------------------------- */
  let tapCount = 0;
  let tapTimeout;

  document.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];
    const x = touch.clientX;
    const y = touch.clientY;

    if (x > window.innerWidth - 80 && y < 80) {
      tapCount++;

      clearTimeout(tapTimeout);
      tapTimeout = setTimeout(() => tapCount = 0, 500);

      if (tapCount === 3) {
        tapCount = 0;
        localStorage.clear();

        const flash = document.createElement("div");
        flash.style.position = "fixed";
        flash.style.top = 0;
        flash.style.left = 0;
        flash.style.width = "100vw";
        flash.style.height = "100vh";
        flash.style.background = "rgba(255,255,255,0.3)";
        flash.style.zIndex = 99999;
        flash.style.pointerEvents = "none";
        flash.style.animation = "devFlash 0.4s ease-out forwards";
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 400);
      }
    }
  });

  /* ---------------------------------------------------------
     MAIN BUTTON LOGIC
  --------------------------------------------------------- */
  const pawBtn = document.getElementById("pawBtn");
  const fortuneBox = document.getElementById("fortuneBox");

  pawBtn.addEventListener("click", () => {
    const rect = pawBtn.getBoundingClientRect();
    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;

    /* -----------------------------------------------------
       BONUS DRAW (bypasses daily limit, still no duplicates)
    ----------------------------------------------------- */
    if (tryBonusFortune()) {
      const f = getWeightedFortune();
      saveUsedFortune(f.id);

      createPixelDust(x, y, f.rarity);
      createConfetti();
      screenFlash();

      fortuneBox.classList.remove("show");
      setTimeout(() => {
        fortuneBox.textContent =
          "✨ Baymax has blessed you with an additional draw today! ✨\n\n" +
          f.text;
        fortuneBox.className = "fortune show " + f.rarity;
      }, 150);

      return;
    }

    /* -----------------------------------------------------
       NORMAL DAILY DRAW
    ----------------------------------------------------- */
    if (!canGetFortuneToday()) {
      fortuneBox.className = "fortune show common";
      fortuneBox.textContent =
        "You have already received your magical fortune today. Return tomorrow.";
      return;
    }

    const fortune = getWeightedFortune();
    saveUsedFortune(fortune.id);

    createPixelDust(x, y, fortune.rarity);

    if (fortune.rarity === "rare") createConfetti();
    if (fortune.rarity === "ultra") {
      createConfetti();
      createFireworks();
      screenFlash();
      screenFlash();
    }

    fortuneBox.classList.remove("show");
    setTimeout(() => {
      fortuneBox.textContent = fortune.text;
      fortuneBox.className = "fortune show " + fortune.rarity;
    }, 150);
  });

  /* ---------------------------------------------------------
     INITIAL FADE-IN
  --------------------------------------------------------- */
  setTimeout(() => fortuneBox.classList.add("show"), 200);
</script>

</body>
</html>
