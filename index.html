<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Baymax The Great!</title>

<style>
  body {
    margin: 0;
    font-family: "Trebuchet MS", system-ui, sans-serif;
    background: radial-gradient(circle at top, #5a2a82, #3b1a5c, #2a1242);
    height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f3d9ff;
    overflow: hidden;
  }

  .wrapper {
    text-align: center;
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    padding: 0 1rem;
  }

  h1 {
    font-size: 1.8rem;
    margin-bottom: 1rem;
    text-shadow: 0 0 12px rgba(255,255,255,0.7);
  }

  .cat-container {
    position: relative;
    width: 70vw;
    max-width: 260px;
    height: 70vw;
    max-height: 260px;
    margin: 0 auto 1.2rem;
  }

  .cat {
    width: 100%;
    height: 100%;
    background-image: url('baymax.png');
    background-size: cover;
    background-position: center;
    border-radius: 12px;
    filter: drop-shadow(0 0 18px rgba(200,150,255,0.9));
    box-shadow: 0 0 25px rgba(180,120,255,0.4);
    transition: filter 0.4s ease, box-shadow 0.4s ease;
  }

  /* BONUS DAY GLOW */
  .cat.bonus-glow {
    filter: drop-shadow(0 0 28px rgba(255,200,255,1));
    box-shadow: 0 0 40px rgba(255,180,255,0.9);
  }

  .paw-btn {
    width: 22vw;
    height: 22vw;
    max-width: 110px;
    max-height: 110px;
    background-image: url('pawprint.png');
    background-size: cover;
    image-rendering: pixelated;
    cursor: pointer;
    margin: 0 auto 1.2rem;
    transition: transform 0.15s ease;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.9));
  }

  .paw-btn:active { transform: scale(0.9); }

  .fortune {
    min-height: 40px;
    max-width: 90%;
    margin: 0.5rem auto 0;
    padding: 0.8rem 1rem;
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.35);
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.22s ease, transform 0.22s ease;
    backdrop-filter: blur(4px);
    text-align: center;
    font-size: 1rem;
    line-height: 1.35;
  }

  .fortune.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* RARITY COLORS */
  .fortune.common { color: #ffffff; }
  .fortune.uncommon { color: #7CFF7C; text-shadow: 0 0 6px rgba(124,255,124,0.6); }
  .fortune.rare { color: #6EC6FF; text-shadow: 0 0 8px rgba(110,198,255,0.8); }
  .fortune.ultra { color: #ffb347; text-shadow: 0 0 12px rgba(255,179,71,1); }

  /* BIG Magical Pixel Dust */
  .particle {
    position: absolute;
    width: 16px;
    height: 16px;
    background: white;
    image-rendering: pixelated;
    border-radius: 3px;
    opacity: 0.95;
    pointer-events: none;
    filter: drop-shadow(0 0 8px white);
    animation: floatBurst 1.4s ease-out forwards;
  }

  @keyframes floatBurst {
    0% { transform: translate(0, 0) scale(1.4); opacity: 1; }
    60% { opacity: 1; }
    100% { transform: translate(var(--x-move), var(--y-move)) scale(0.4); opacity: 0; }
  }

  /* Star Rain */
  .star {
    position: fixed;
    top: -20px;
    width: 10px;
    height: 10px;
    background: #ffeaff;
    border-radius: 50%;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 6px #ffd6ff);
    opacity: 0.9;
    animation: fall linear forwards;
  }

  @keyframes fall {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(110vh) scale(0.4); opacity: 0; }
  }

  /* EXPLODING CONFETTI */
  .confetti {
    position: fixed;
    width: 12px;
    height: 16px;
    background: pink;
    opacity: 0.9;
    pointer-events: none;
    border-radius: 2px;
    filter: drop-shadow(0 0 6px rgba(255,200,255,0.8));
    animation: confettiExplode 2.4s ease-out forwards;
  }

  @keyframes confettiExplode {
    0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--x-move), var(--y-move)) rotate(var(--spin)); opacity: 0; }
  }

  /* Ultra Rare Fireworks */
  .firework {
    position: fixed;
    width: 8px;
    height: 8px;
    background: #ffd6ff;
    border-radius: 50%;
    pointer-events: none;
    animation: fireworkFall 1.2s ease-out forwards;
    filter: drop-shadow(0 0 8px #ffbaff);
  }

  @keyframes fireworkFall {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(100vh) scale(0.2); opacity: 0; }
  }

  /* ULTRA RARE SCREEN FLASH */
  .screen-flash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(255, 180, 50, 0.8);
    pointer-events: none;
    z-index: 9999;
    animation: flashFade 0.6s ease-out forwards;
  }

  @keyframes flashFade {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.5rem; }
    .fortune { font-size: 0.95rem; }
  }
</style>
</head>

<body>

<div class="wrapper">
  <h1>🌙 Ask Baymax the Great! 🌙</h1>

  <div class="cat-container">
    <div class="cat" id="cat"></div>
  </div>

  <div class="paw-btn" id="pawBtn"></div>

  <div class="fortune" id="fortuneBox">
    Press the pawprint to know your future..
  </div>
</div>

<script>
/* ---------------------------------------------------------
   ANIMATION FUNCTIONS — MUST COME FIRST
--------------------------------------------------------- */
function createPixelDust(x, y, rarity = "common") {
  let colors;

  if (rarity === "common") colors = ["#ffffff", "#eaeaea", "#dcdcdc"];
  else if (rarity === "uncommon") colors = ["#7CFF7C", "#b0ffb0", "#d6ffd6"];
  else if (rarity === "rare") colors = ["#6EC6FF", "#a8e0ff", "#d0f0ff"];
  else if (rarity === "ultra") colors = ["#ffb347", "#ffd197", "#ffe3c2"];

  for (let i = 0; i < 40; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");

    p.style.background = colors[Math.floor(Math.random() * colors.length)];

    p.style.left = x + "px";
    p.style.top = y + "px";

    const angle = Math.random() * Math.PI * 2;
    const distance = 120 + Math.random() * 200;

    const xMove = Math.cos(angle) * distance;
    const yMove = Math.sin(angle) * distance - 80;

    p.style.setProperty("--x-move", `${xMove}px`);
    p.style.setProperty("--y-move", `${yMove}px`);

    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

function createConfetti() {
  const originX = window.innerWidth / 2;
  const originY = window.innerHeight / 3;

  for (let i = 0; i < 60; i++) {
    const c = document.createElement("div");
    c.classList.add("confetti");

    const colors = ["#ff9fff", "#d28bff", "#ffb3ff"];
    c.style.background = colors[Math.floor(Math.random() * colors.length)];

    c.style.left = originX + "px";
    c.style.top = originY + "px";

    const angle = Math.random() * Math.PI * 2;
    const distance = 200 + Math.random() * 200;

    const xMove = Math.cos(angle) * distance;
    const yMove = Math.sin(angle) * distance + 300;

    c.style.setProperty("--x-move", `${xMove}px`);
    c.style.setProperty("--y-move", `${yMove}px`);

    const spin = (Math.random() * 720 - 360) + "deg";
    c.style.setProperty("--spin", spin);

    document.body.appendChild(c);
    setTimeout(() => c.remove(), 2500);
  }
}

function createFireworks() {
  for (let i = 0; i < 60; i++) {
    const f = document.createElement("div");
    f.classList.add("firework");
    f.style.left = Math.random() * 100 + "vw";
    f.style.background = ["#ffd6ff", "#ffbaff", "#ffe6ff"][Math.floor(Math.random()*3)];
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1200);
  }
}

function screenFlash() {
  const flash = document.createElement("div");
  flash.classList.add("screen-flash");
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 600);
}

function spawnStar() {
  const star = document.createElement("div");
  star.classList.add("star");
  star.style.left = Math.random() * 100 + "vw";
  star.style.animationDuration = 3 + Math.random() * 4 + "s";
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 7000);
}
setInterval(spawnStar, 200);

/* ---------------------------------------------------------
   LOAD FORTUNES + BONUS DAY
--------------------------------------------------------- */
let fortunes = [];
let bonusDay = null;

Promise.all([
  fetch("fortunes.json").then(r => r.json()),
  fetch("bonus.json").then(r => r.json()).catch(() => ({ bonusDay: null }))
]).then(([fortuneData, bonusData]) => {
  fortunes = fortuneData.fortunes;
  bonusDay = bonusData.bonusDay;
  applyBonusGlow();
});

/* ---------------------------------------------------------
   NO-DUPLICATE SYSTEM
--------------------------------------------------------- */
function getUsedFortunes() {
  return JSON.parse(localStorage.getItem("usedFortunes") || "[]");
}

function saveUsedFortunes(arr) {
  localStorage.setItem("usedFortunes", JSON.stringify(arr));
}

function getUnusedFortunes() {
  const used = getUsedFortunes();
  return fortunes.filter(f => !used.includes(f.id));
}

function drawUniqueFortune() {
  let unused = getUnusedFortunes();

  if (unused.length === 0) {
    saveUsedFortunes([]);
    unused = fortunes;
  }

  const total = unused.reduce((sum, f) => sum + f.weight, 0);
  let r = Math.random() * total;

  for (const f of unused) {
    if (r < f.weight) return f;
    r -= f.weight;
  }
  return unused[0];
}

/* ---------------------------------------------------------
   DAILY LIMIT + BONUS DAY
--------------------------------------------------------- */
function isBonusDay() {
  const today = new Date().toLocaleDateString("en-CA"); 
  return today === bonusDay;
}

function canDrawToday() {
  const today = new Date().toDateString();
  const last = localStorage.getItem("lastDrawDate");

  if (isBonusDay()) return true;

  if (last === today) return false;

  localStorage.setItem("lastDrawDate", today);
  return true;
}

/* ---------------------------------------------------------
   BONUS GLOW
--------------------------------------------------------- */
function applyBonusGlow() {
  if (isBonusDay()) {
    document.getElementById("cat").classList.add("bonus-glow");
  }
}

/* ---------------------------------------------------------
   MAIN DRAW LOGIC
--------------------------------------------------------- */
const pawBtn = document.getElementById("pawBtn");
const fortuneBox = document.getElementById("fortuneBox");

pawBtn.addEventListener("click", () => {
  if (!canDrawToday()) {
    fortuneBox.className = "fortune show common";
    fortuneBox.textContent = "You have already received your magical fortune today. Return tomorrow.";
    return;
  }

  const rect = pawBtn.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  const y = rect.top + rect.height / 2;

  const fortune = drawUniqueFortune();

  const used = getUsedFortunes();
  used.push(fortune.id);
  saveUsedFortunes(used);

  createPixelDust(x, y, fortune.rarity);

  if (fortune.rarity === "rare") createConfetti();
  if (fortune.rarity === "ultra") {
    createConfetti();
    createFireworks();
    screenFlash();
  }

  fortuneBox.classList.remove("show");
  setTimeout(() => {
    fortuneBox.textContent = fortune.text;
    fortuneBox.className = "fortune show " + fortune.rarity;
  }, 150);

  if (isBonusDay()) {
    setTimeout(() => {
      fortuneBox.textContent += "\n\n✨ Baymax has blessed you with an extra draw today! ✨";
    }, 300);
  }
});

/* ---------------------------------------------------------
   INITIALIZE
--------------------------------------------------------- */
setTimeout(() => fortuneBox.classList.add("show"), 200);
</script>

</body>
</html>
