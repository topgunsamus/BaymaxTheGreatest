<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Baymax Fortune Machine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root {
    --bg: radial-gradient(circle at top, #2b2b4f 0, #0a0a12 45%, #000000 100%);
    --card-bg: rgba(15, 15, 30, 0.9);
    --accent: #ff66cc;
    --accent-soft: #ff9ee6;
    --text-main: #ffffff;
    --text-soft: #d0d0ff;
    --border-glow: 0 0 20px rgba(255, 102, 204, 0.6);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text-main);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  .wrapper {
    max-width: 900px;
    width: 100%;
    background: linear-gradient(145deg, rgba(20, 20, 40, 0.95), rgba(10, 10, 25, 0.98));
    border-radius: 24px;
    padding: 24px 20px 28px;
    box-shadow:
      0 0 40px rgba(0, 0, 0, 0.8),
      0 0 60px rgba(255, 102, 204, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.08);
    position: relative;
    overflow: hidden;
  }

  .wrapper::before,
  .wrapper::after {
    content: "";
    position: absolute;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 102, 204, 0.18), transparent 70%);
    filter: blur(2px);
    z-index: 0;
  }

  .wrapper::before {
    top: -80px;
    left: -60px;
  }

  .wrapper::after {
    bottom: -100px;
    right: -40px;
  }

  .content {
    position: relative;
    z-index: 1;
  }

  header {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    justify-content: center;
  }

  #baymax {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255, 255, 255, 0.7);
    box-shadow:
      0 0 25px rgba(255, 255, 255, 0.4),
      0 0 40px rgba(255, 102, 204, 0.4);
    background: #000;
  }

  .title-block {
    text-align: left;
    max-width: 480px;
  }

  h1 {
    margin: 0;
    font-size: 1.9rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-shadow:
      0 0 12px rgba(255, 255, 255, 0.7),
      0 0 22px rgba(255, 102, 204, 0.7);
  }

  .subtitle {
    margin-top: 6px;
    font-size: 0.95rem;
    color: var(--text-soft);
  }

  .fortune-card {
    margin-top: 18px;
    background: var(--card-bg);
    border-radius: 18px;
    padding: 18px 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 18px rgba(0, 0, 0, 0.7);
  }

  .fortune-label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--accent-soft);
    margin-bottom: 8px;
  }

  .fortune {
    font-size: 1.2rem;
    line-height: 1.5;
    white-space: pre-wrap;
    color: #fdfdff;
    min-height: 3.2em;
  }

  .controls {
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #fortuneButton {
    padding: 14px 32px;
    font-size: 1.05rem;
    border-radius: 999px;
    border: none;
    background: radial-gradient(circle at top left, #ff9ee6, #ff66cc);
    color: #1a0010;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow:
      0 0 18px rgba(255, 102, 204, 0.7),
      0 0 30px rgba(255, 255, 255, 0.4);
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
  }

  #fortuneButton:active {
    transform: scale(0.96);
    box-shadow:
      0 0 10px rgba(255, 102, 204, 0.6),
      0 0 18px rgba(255, 255, 255, 0.3);
    filter: brightness(0.96);
  }

  .hint {
    font-size: 0.8rem;
    color: rgba(220, 220, 255, 0.7);
  }

  .sparkle {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkleAnim 1s ease-out forwards;
    mix-blend-mode: screen;
  }

  @keyframes sparkleAnim {
    0% {
      transform: translate3d(0, 0, 0) scale(1);
      opacity: 1;
    }
    60% {
      opacity: 1;
    }
    100% {
      transform: translate3d(0, -60px, 0) scale(0);
      opacity: 0;
    }
  }

  .flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #ffffff, #ffd6f5, #ff9ee6);
    opacity: 0.85;
    animation: flashAnim 0.7s ease-out forwards;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  @keyframes flashAnim {
    from {
      opacity: 0.85;
    }
    to {
      opacity: 0;
    }
  }

  @media (max-width: 600px) {
    .wrapper {
      padding: 18px 14px 22px;
      border-radius: 20px;
    }

    header {
      flex-direction: column;
      text-align: center;
    }

    .title-block {
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
    }

    .fortune {
      font-size: 1.05rem;
    }

    #baymax {
      width: 96px;
      height: 96px;
    }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="content">
    <header>
      <img id="baymax" src="baymax.png" alt="Baymax" />
      <div class="title-block">
        <h1>Baymax Fortune Machine</h1>
        <div class="subtitle">
          One pull per day… unless Baymax secretly blesses you with more.
        </div>
      </div>
    </header>

    <div class="fortune-card">
      <div class="fortune-label">Today's Fortune</div>
      <div class="fortune"></div>
    </div>

    <div class="controls">
      <button id="fortuneButton">Reveal My Fortune</button>
      <div class="hint">
        (Triple-tap anywhere to reset for testing)
      </div>
    </div>
  </div>
</div>

<script>
/* ---------------------------------------------------------
   GLOBAL STATE
--------------------------------------------------------- */
let fortunes = [];
let bonusDay = null;

/* ---------------------------------------------------------
   LOAD FORTUNES FROM fortunes.json
--------------------------------------------------------- */
async function loadFortunes() {
  try {
    const res = await fetch("fortunes.json");
    const data = await res.json();
    fortunes = data.fortunes.map((f, i) => ({
      id: i + 1,
      ...f
    }));
  } catch (e) {
    console.error("Error loading fortunes.json", e);
  }
}

loadFortunes();

/* ---------------------------------------------------------
   LOAD BONUS DAY FROM bonus.json
--------------------------------------------------------- */
async function loadBonusDay() {
  try {
    const res = await fetch("bonus.json");
    const data = await res.json();
    bonusDay = data.bonusDay;
  } catch (e) {
    console.error("bonus.json missing or invalid");
  }
}

loadBonusDay();

/* ---------------------------------------------------------
   DATE HELPERS
--------------------------------------------------------- */
function todayString() {
  return new Date().toISOString().split("T")[0];
}

function isToday(dateString) {
  return todayString() === dateString;
}

/* ---------------------------------------------------------
   BONUS SYSTEM
--------------------------------------------------------- */
function resetBonusIfNewDay() {
  const today = todayString();
  const last = localStorage.getItem("bonusLastCheck");

  if (today !== last) {
    localStorage.removeItem("bonusUsed");
    localStorage.setItem("bonusLastCheck", today);
  }
}

resetBonusIfNewDay();

function tryBonusFortune() {
  if (!bonusDay || bonusDay === "none") return false;
  if (!isToday(bonusDay)) return false;
  if (localStorage.getItem("bonusUsed") === "true") return false;

  localStorage.setItem("bonusUsed", "true");
  return true;
}

/* ---------------------------------------------------------
   NO DUPLICATE SYSTEM
--------------------------------------------------------- */
function getUsedFortunes() {
  return JSON.parse(localStorage.getItem("usedFortunes") || "[]");
}

function saveUsedFortune(id) {
  const used = getUsedFortunes();
  used.push(id);
  localStorage.setItem("usedFortunes", JSON.stringify(used));
}

/* ---------------------------------------------------------
   WEIGHTED RANDOM PICK
--------------------------------------------------------- */
function getWeightedFortune() {
  const used = getUsedFortunes();
  const available = fortunes.filter(f => !used.includes(f.id));

  if (available.length === 0) {
    localStorage.removeItem("usedFortunes");
    return {
      text: "You've seen every fortune! The universe quietly reshuffles the deck for you…",
      rarity: "rare",
      weight: 1
    };
  }

  const total = available.reduce((sum, f) => sum + f.weight, 0);
  let r = Math.random() * total;

  for (const f of available) {
    if (r < f.weight) return f;
    r -= f.weight;
  }

  return available[0];
}

/* ---------------------------------------------------------
   SPARKLES + FLASH
--------------------------------------------------------- */
function spawnSparkles(color) {
  for (let i = 0; i < 22; i++) {
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.background = color;

    const angle = Math.random() * Math.PI * 2;
    const radius = 40 + Math.random() * 120;
    const centerX = window.innerWidth / 2;
    const centerY = window.innerHeight / 2;

    s.style.left = centerX + Math.cos(angle) * radius + "px";
    s.style.top = centerY + Math.sin(angle) * radius + "px";

    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}

function flashScreen() {
  const f = document.createElement("div");
  f.className = "flash";
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 700);
}

/* ---------------------------------------------------------
   MAIN BUTTON LOGIC
--------------------------------------------------------- */
const fortuneEl = document.querySelector(".fortune");
const buttonEl = document.getElementById("fortuneButton");

buttonEl.addEventListener("click", () => {
  if (!fortunes.length) return;

  /* --- BONUS DRAW --- */
  if (tryBonusFortune()) {
    const fortune = getWeightedFortune();
    fortuneEl.textContent =
      "✨ Baymax has blessed you with an additional draw today! ✨\n\n" + fortune.text;

    saveUsedFortune(fortune.id);

    flashScreen();
    spawnSparkles("#ff00ff");

    return;
  }

  /* --- NORMAL DRAW --- */
  const fortune = getWeightedFortune();
  fortuneEl.textContent = fortune.text;

  saveUsedFortune(fortune.id);

  if (fortune.rarity === "common") spawnSparkles("#ffffff");
  if (fortune.rarity === "uncommon") spawnSparkles("#4cff4c");
  if (fortune.rarity === "rare") spawnSparkles("#4cbaff");
  if (fortune.rarity === "ultra") {
    spawnSparkles("#ff8800");
    flashScreen();
  }
});

/* ---------------------------------------------------------
   TRIPLE TAP DEV RESET
--------------------------------------------------------- */
let tapCount = 0;
document.body.addEventListener("click", () => {
  tapCount++;
  setTimeout(() => (tapCount = 0), 600);
  if (tapCount >= 3) {
    localStorage.clear();
    alert("Dev reset complete!");
  }
});
</script>
</body>
</html>
